name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Render sample bibliography (smoke check)
        run: python3 scripts/demo.py

      - name: Build extension
        run: ./build.sh

      - name: Upload .oxt artifact
        uses: actions/upload-artifact@v4
        with:
          name: mendeley-libreoffice-oxt
          path: dist/mendeley-libreoffice.oxt
          if-no-files-found: error
